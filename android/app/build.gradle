apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'

// secureStorage Rust build coordinates - source of truth lives in
// android/gradle.properties so the Gradle side and the bash script
// (scripts/build-native-android.sh) cannot drift.
def gossipNdkVersion = project.findProperty('gossip.ndkVersion')
if (!gossipNdkVersion) {
    throw new GradleException("gossip.ndkVersion missing from gradle.properties")
}
def gossipAbis = (project.findProperty('gossip.abis') ?: '').split(',').findAll { it }
if (gossipAbis.isEmpty()) {
    throw new GradleException("gossip.abis missing from gradle.properties")
}

android {
    namespace = "net.massa.gossip"
    compileSdk = rootProject.ext.compileSdkVersion
    // Pinned to keep the .so produced by scripts/build-native-android.sh
    // reproducible across dev/CI. Source of truth: gossip.ndkVersion in
    // android/gradle.properties.
    ndkVersion gossipNdkVersion
    defaultConfig {
        applicationId "net.massa.gossip"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        ndk {
            // 64-bit-only: Play Store has required 64-bit companions
            // since 2019 and all supported devices ship 64-bit. To add
            // 32-bit markets, append the ABI to gossip.abis in
            // gradle.properties; the bash script reads the same key.
            abiFilters(*gossipAbis)
        }
        // Use an auto-generated numeric versionCode so each build is unique without manual bumping.
        // We must stay within the 32-bit signed int limit required by Google Play (max 2147483647).
        //
        // If set, ANDROID_VERSION_CODE must be a numeric string (e.g. '1700000000') that is
        // <= Integer.MAX_VALUE. If not set or invalid, we fall back to the current Unix time
        // in seconds (System.currentTimeMillis() / 1000), which will be safely < 2147483647
        // until year 2038.
        def envVersionCode = System.getenv("ANDROID_VERSION_CODE")
        def resolvedVersionCode
        if (envVersionCode != null && envVersionCode ==~ /^\d+$/) {
            resolvedVersionCode = envVersionCode.toLong()
        } else {
            resolvedVersionCode = (System.currentTimeMillis() / 1000L)
        }
        if (resolvedVersionCode > Integer.MAX_VALUE) {
            throw new IllegalArgumentException("Resolved ANDROID_VERSION_CODE (" + resolvedVersionCode +
                    ") exceeds 32-bit int max value (" + Integer.MAX_VALUE + ").")
        }
        versionCode resolvedVersionCode.toInteger()
        versionName "0.0.12"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        release {
            if (System.getenv('ANDROID_KEYSTORE_FILE')) {
                storeFile file(System.getenv('ANDROID_KEYSTORE_FILE'))
                storePassword System.getenv('ANDROID_KEYSTORE_PASSWORD')
                keyAlias System.getenv('ANDROID_KEY_ALIAS')
                keyPassword System.getenv('ANDROID_KEY_PASSWORD')
            }
        }
    }

    buildFeatures {
        buildConfig = true
    }

    // Both Java and Kotlin compile to JVM 21 bytecode. Matches the
    // default JDK shipped with recent Android Studio (2024+) and
    // modern macOS installs, so devs don't need to install a second
    // JDK just for this project. Capacitor plugins' 17-bytecode .aars
    // are forward-compatible with 21. Bump both (and the host JDK
    // min) together if you ever raise the target.
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_21.toString()
    }

    buildTypes {
        release {
            if (System.getenv('ANDROID_KEYSTORE_FILE')) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
		dirs '../../node_modules/@capacitor/background-runner/android/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.work:work-runtime:$androidxWorkVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    // UniFFI-generated Kotlin bindings need JNA at runtime.
    // kotlin-stdlib is provided transitively by the Kotlin Android
    // plugin — pinning it explicitly can conflict with Capacitor's
    // own Kotlin version.
    implementation 'net.java.dev.jna:jna:5.14.0@aar'
}

apply from: 'capacitor.build.gradle'

// ── secure-storage Rust build ────────────────────────────────────────
//
// Keeps `android/app/src/main/jniLibs/*/libsecureStorage.so` and the
// UniFFI-generated Kotlin bindings out of git (see .gitignore): this
// task regenerates them on demand before every Android build. cargo's
// own caching keeps the no-op path fast (seconds when the Rust source
// hasn't changed).
//
// Run manually with:    ./gradlew :app:buildRustSecureStorage
// Or indirectly via:    ./gradlew :app:preBuild  (any assemble task)
tasks.register('buildRustSecureStorage', Exec) {
    group = 'secure-storage'
    description = 'Cross-compile the secureStorage Rust crate into jniLibs + regenerate UniFFI Kotlin bindings.'
    def rootDir = project.rootProject.projectDir.parentFile
    workingDir rootDir
    // Always build Rust in --release, even under Gradle's "debug"
    // variant. The PQ crypto (ML-KEM rerand) is ~10-50× slower in a
    // debug Rust build — session allocate / cover-traffic tick become
    // seconds-long. Line-tables are kept via Cargo.toml's profile
    // settings so crash frames still symbolicate.
    //
    // Override with `SECURE_STORAGE_RUST_PROFILE=debug ./gradlew …` if
    // you need stepping debug into the Rust code.
    def rustProfileEnv = System.getenv('SECURE_STORAGE_RUST_PROFILE') ?: 'release'
    def profileFlag = rustProfileEnv == 'debug' ? '--debug' : '--release'
    commandLine 'bash', 'scripts/build-native-android.sh', profileFlag

    // Declare outputs so Gradle skips the task on no-op builds.
    outputs.files(
        fileTree("${project.projectDir}/src/main/jniLibs") {
            include '*/libsecureStorage.so'
        },
        fileTree("${project.projectDir}/src/main/java/uniffi") {
            include '**/*.kt'
        }
    )
    // Re-run when the Rust source or any path-dep crate changes.
    // Cargo.lock catches transitive bumps from `cargo update`; the
    // sister-crate dirs catch local edits in the secureStorage dep
    // graph (crypto-aead/kdf/password-kdf supply primitives, and
    // uniffi-bindgen produces the Kotlin bindings).
    inputs.dir "${rootDir}/wasm/secure-storage/src"
    inputs.file "${rootDir}/wasm/Cargo.toml"
    inputs.file "${rootDir}/wasm/Cargo.lock"
    inputs.file "${rootDir}/wasm/secure-storage/Cargo.toml"
    inputs.dir "${rootDir}/wasm/crypto-aead/src"
    inputs.dir "${rootDir}/wasm/crypto-kdf/src"
    inputs.dir "${rootDir}/wasm/crypto-password-kdf/src"
    inputs.dir "${rootDir}/wasm/uniffi-bindgen"
    inputs.file "${rootDir}/scripts/build-native-android.sh"
    // Pin the NDK version into the input fingerprint so switching it
    // in gradle.properties invalidates the cached .so even when the
    // Rust source is unchanged.
    inputs.property 'ndkVersion', gossipNdkVersion
    inputs.property 'abis', gossipAbis.join(',')
    // Track the profile flag as an input so switching between release
    // and debug invalidates the cached .so. Without this, Gradle sees
    // no source change and happily reuses a stale debug .so under a
    // release build (the symptom: "native is suddenly slow again").
    inputs.property 'rustProfile', rustProfileEnv
}

afterEvaluate {
    tasks.named('preBuild').configure { dependsOn 'buildRustSecureStorage' }
}

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
    // Narrow catch: the only expected exception is the file being
    // absent. Malformed-JSON or plugin-apply failures must surface so
    // a broken google-services.json is not silently ignored.
} catch(FileNotFoundException e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
