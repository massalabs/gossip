# Biometric authentication test
# Tests: biometric login success, failure, and fallback to password.
#
# Run:   maestro test .maestro/biometric_login.yaml
# Device: iOS simulator with Face ID enrolled, or Android emulator with fingerprint
# Pre-condition: Account exists with biometric auth method.
#
# iOS setup:  Simulator > Features > Face ID > Enrolled
# Android:    adb -e emu finger touch 1 (to simulate fingerprint)

appId: net.massa.gossip
---

# ===== PART 1: Biometric login success =====

- launchApp
- waitForAnimationToEnd
- takeScreenshot: bio_01_login_screen

# Verify biometric button is visible
- assertVisible: "Login with biometrics"

# Tap biometric login
- tapOn: "Login with biometrics"

# Simulate successful biometric
- setBiometric: "face"
- waitForAnimationToEnd

# Should be past login — verify discussions or main screen is visible
- takeScreenshot: bio_02_after_success

# ===== PART 2: Biometric failure =====

# Go back to login by pressing home and reopening
- pressKey: home
- launchApp
- waitForAnimationToEnd

# Tap biometric again
- tapOn:
    text: "Login with biometrics"
    optional: true

# Simulate failure
- setBiometric: "no match"
- waitForAnimationToEnd

# App should show error or stay on login
- takeScreenshot: bio_03_after_failure

# ===== PART 3: Password fallback =====

# After biometric failure, password field should be accessible
# The login screen shows Password input when usePassword or as fallback
- assertVisible:
    text: "Password"
    optional: true

- takeScreenshot: bio_04_password_fallback
