# Keyboard behavior test — iOS
# Verifies: keyboard opens smoothly, layout adapts (KeyboardResize.None), no content hidden.
#
# Run:   maestro test .maestro/keyboard_ios.yaml
# Device: iOS simulator (iPhone 16 Pro) or real device
# Pre-condition: App installed, user logged in, at least one active discussion.

appId: net.ben.gossip
---

- launchApp
- waitForAnimationToEnd

# Navigate to Discussions tab
- tapOn:
    text: "Discussions"
- waitForAnimationToEnd
- takeScreenshot: keyboard_ios_01_list

# Open first discussion
- tapOn:
    index: 0
- waitForAnimationToEnd

# Tap message input
- tapOn:
    text: "Type a message"
- waitForAnimationToEnd
- takeScreenshot: keyboard_ios_02_keyboard_open

# Type and verify
- inputText: "Maestro iOS keyboard test"
- assertVisible: "Maestro iOS keyboard test"
- takeScreenshot: keyboard_ios_03_typed

# Scroll while keyboard open
- scroll:
    direction: UP
    duration: 500
- scroll:
    direction: DOWN
    duration: 500
- assertVisible: "Maestro iOS keyboard test"

# Dismiss keyboard
- hideKeyboard
- waitForAnimationToEnd
- takeScreenshot: keyboard_ios_04_dismissed

# Re-open and type again
- tapOn:
    text: "Maestro iOS keyboard test"
- eraseText: 30
- inputText: "Second iOS test"
- assertVisible: "Second iOS test"
- takeScreenshot: keyboard_ios_05_second
