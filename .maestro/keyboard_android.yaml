# Keyboard behavior test — Android
# Verifies: keyboard opens, layout adapts, no content hidden, send works.
#
# Run:   maestro test .maestro/keyboard_android.yaml
# Device: Android emulator (Medium_Phone_API_36.1) or real device
# Pre-condition: App installed, user logged in, at least one active discussion.

appId: net.massa.gossip
---
- launchApp
- waitForAnimationToEnd

# Tap first discussion to open it
- tapOn:
    text: 'Discussions'
- waitForAnimationToEnd
- takeScreenshot: keyboard_01_discussion_list

# Open a discussion (tap the first conversation item)
- tapOn:
    index: 0
- waitForAnimationToEnd

# Tap the message input to open keyboard
- tapOn:
    text: 'Type a message'
- waitForAnimationToEnd
- takeScreenshot: keyboard_02_keyboard_open

# Type a message and verify it's visible
- inputText: 'Maestro keyboard test'
- assertVisible: 'Maestro keyboard test'
- takeScreenshot: keyboard_03_text_typed

# Scroll up while keyboard is open — messages should still be accessible
- swipe:
    direction: UP
    duration: 500
- swipe:
    direction: DOWN
    duration: 500

# Text should still be in the input
- assertVisible: 'Maestro keyboard test'

# Dismiss keyboard with back button
- pressKey: back
- waitForAnimationToEnd
- takeScreenshot: keyboard_04_keyboard_dismissed

# Re-open keyboard
- tapOn:
    text: 'Maestro keyboard test'
- waitForAnimationToEnd

# Clear and type again
- eraseText: 25
- inputText: 'Second test message'
- assertVisible: 'Second test message'
- takeScreenshot: keyboard_05_second_input
